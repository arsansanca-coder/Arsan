    <section class="banner-interno"
    style="background-image: url(img/Clinica\ Moderna.jpg);"> 
    <div>
        <h1>Agendamento Online</h1>
        <p>Preencha o formulário abaixo.</p>
    </div>
    </section><br>

    <div class="container mt-5 pt-5">
        <form action="https://formsubmit.co/Suniciosanca97@gmail.com" method="post">
            <div class="row g-3">
                <div class="col-12">
                    <input type="text" class="form-control" placeholder="Nome" required>
                </div>
                <div class="col-md-6">
                    <input type="email" class="form-control" placeholder="Email" required>
                </div>
                <div class="col-md-6">
                    <input type="tel" class="form-control" placeholder="Telefone" required>
                </div>
                <div class="col-md-6">
                    <input type="date" name="Data" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <input type="time" name="Horario" class="form-control" required>
                </div>
                <div class="col-12">
                    <select name="Especialidade" class="form-select" required>
                        <option value="">Escolha a Especialidade</option>
                        <option>Cardiologia</option>
                        <option>Ortopedia</option>
                        <option>Pediatria</option>
                        <option>Ginecologia</option>
                        <option>Dermatologia</option>
                        <option>Clínico Geral</option>
                    </select>
                </div>
                <div class="col-12">
                    <textarea class="form-control" rows="4" placeholder="Observações"></textarea>
                </div>
                <div class="col-12 text-center">
                    <button type="submit" class="btn btn-primary">Confirmar Agendamento</button>
                </div>
            </div>
        </form>
    </div>
